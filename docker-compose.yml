name: SilRokAIServer
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8080:8000"
    depends_on:
      - redis_str
      - redis_byte
  
  redis_str:
    image: redis:latest

  redis_byte:
    image: redis:latest