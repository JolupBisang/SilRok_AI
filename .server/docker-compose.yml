name: SilRokAIServer
services:
    app:
        build:
            context: ..
            dockerfile: .server/Dockerfile
        shm_size: "36gb"
        volumes:
            - ../.model/huggingface:/root/.cache/huggingface
            - ../.model/torch:/root/.cache/torch
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: 1
                          capabilities: [gpu]

    nginx:
        image: nginx:latest
        ports:
            - "8080:443"
        volumes:
            - ../nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
            - ../nginx/certbot/conf:/etc/letsencrypt/live
            - ../nginx/certbot/www:/var/www/certbot
        depends_on:
            - app
