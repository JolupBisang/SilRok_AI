name: SilRokAIServer
services:
  app:
    build:
      context: ..
      dockerfile: .server/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis_str
      - redis_byte
  
  redis_str:
    image: redis:latest

  redis_byte:
    image: redis:latest

  nginx:
    image: nginx:latest
    ports:
      - "8080:443"
    volumes:
      - ../nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ../nginx/certbot/conf:/etc/letsencrypt/live
      - ../nginx/certbot/www:/var/www/certbot
    depends_on:
      - app